name: Backfills

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which backfill to run'
        required: true
        type: choice
        options:
          - streaming
          - popularity
          - tmdb-scores
          - rt-scores
          - imdb-ids
          - migrate-images
          - genres

jobs:
  backfill-streaming:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'streaming'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill streaming
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WATCHMODE_API_KEY: ${{ secrets.WATCHMODE_API_KEY }}
        run: python -m bot.backfill_streaming

  backfill-popularity:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'popularity'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill popularity
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_popularity

  backfill-tmdb-scores:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'tmdb-scores'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill TMDb scores
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_tmdb_scores

  backfill-rt-scores:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'rt-scores'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill RT scores
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_rt_scores

  backfill-imdb-ids:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'imdb-ids'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill IMDb IDs
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_imdb_ids

  migrate-images:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'migrate-images'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Migrate images
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.migrate_images

  backfill-genres:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'genres'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill genres
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_genres
