name: Backfills

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which backfill to run'
        required: true
        type: choice
        options:
          - streaming
          - popularity
          - popularity-score
          - vote-count
          - status
          - metadata
          - tmdb-scores
          - rt-scores
          - imdb-ids
          - migrate-images
          - genres
          - states
          - trailers
          - credits
          - runtime
          - title-logos
          - backdrops
          - certifications
          - seasons
          - season-ratings
          - release-dates
          - credits-order
      role:
        description: 'Credits role filter (optional, e.g. producer). Only used when job == credits.'
        required: false
        default: ''

jobs:
  backfill-streaming:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'streaming'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill streaming
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_streaming

  backfill-popularity:
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'popularity'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Backfill popularity
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m bot.backfill_popularity

  backfill-popularity-score:
